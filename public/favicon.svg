      <stop offset="0" stop-color="#8E2A2A"/>
      <stop offset="1" stop-color="#6E1818"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E3B45E"/>
      <stop offset="1" stop-color="#C9973A"/>
